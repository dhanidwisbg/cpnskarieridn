<!DOCTYPE html>
<html>
<head><title>Generate Rounded Favicon</title></head>
<body>
<canvas id="c" width="128" height="128"></canvas>
<a id="dl" download="logo-web-rounded.png">Download</a>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.beginPath();
    const r = 23; // border-radius ~10px scaled to 128px icon
    ctx.moveTo(r, 0);
    ctx.lineTo(128 - r, 0);
    ctx.quadraticCurveTo(128, 0, 128, r);
    ctx.lineTo(128, 128 - r);
    ctx.quadraticCurveTo(128, 128, 128 - r, 128);
    ctx.lineTo(r, 128);
    ctx.quadraticCurveTo(0, 128, 0, 128 - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(img, 0, 0, 128, 128);
    document.getElementById('dl').href = canvas.toDataURL('image/png');
    document.getElementById('dl').click();
  };
  img.src = '/logo-web.png';
</script>
</body>
</html>
